
<!DOCTYPE html>
<html>
<head>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #000;
    color: #d4af37;
    font-family: 'Crimson Text', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .starfield {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(ellipse at 20% 50%, #0a0a2e 0%, #000 70%);
    z-index: 0;
  }

  .starfield::before {
    content: '';
    position: absolute; inset: 0;
    background-image: 
      radial-gradient(1px 1px at 10% 15%, white 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 40%, rgba(255,255,255,0.8) 0%, transparent 100%),
      radial-gradient(1px 1px at 40% 8%, white 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 55%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 25%, white 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 70%, rgba(255,255,255,0.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 80%, white 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(2px 2px at 60% 85%, white 0%, transparent 100%),
      radial-gradient(1px 1px at 35% 60%, rgba(255,255,255,0.9) 0%, transparent 100%),
      radial-gradient(1px 1px at 75% 45%, white 0%, transparent 100%),
      radial-gradient(2px 2px at 5% 30%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 48% 72%, white 0%, transparent 100%),
      radial-gradient(1px 1px at 92% 88%, rgba(255,255,255,0.8) 0%, transparent 100%),
      radial-gradient(1px 1px at 22% 95%, white 0%, transparent 100%);
  }

  .container {
    position: relative; z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 40px 24px 60px;
  }

  .title-block {
    text-align: center;
    margin-bottom: 36px;
  }

  .title-block .episode {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 6px;
    color: #8a7a3a;
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .title-block h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(22px, 5vw, 34px);
    font-weight: 900;
    color: #d4af37;
    letter-spacing: 3px;
    text-shadow: 0 0 20px rgba(212,175,55,0.5);
    line-height: 1.2;
    margin-bottom: 10px;
  }

  .title-block .subtitle {
    font-size: 14px;
    color: #8a7a3a;
    font-style: italic;
    letter-spacing: 1px;
  }

  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 24px 0;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, #d4af37, transparent);
  }
  .divider-icon { color: #d4af37; font-size: 16px; }

  .form-section {
    background: rgba(212,175,55,0.04);
    border: 1px solid rgba(212,175,55,0.2);
    border-radius: 4px;
    padding: 28px 24px;
    margin-bottom: 24px;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }

  .field-group {
    display: flex; flex-direction: column; gap: 8px;
  }

  label {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 3px;
    color: #8a7a3a;
    text-transform: uppercase;
  }

  .initial-input {
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(212,175,55,0.3);
    color: #d4af37;
    font-family: 'Cinzel', serif;
    font-size: 28px;
    font-weight: 700;
    text-align: center;
    padding: 12px;
    border-radius: 2px;
    width: 100%;
    text-transform: uppercase;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    caret-color: #d4af37;
  }

  .initial-input:focus {
    border-color: #d4af37;
    box-shadow: 0 0 12px rgba(212,175,55,0.2);
  }

  .options-row {
    display: flex; gap: 12px; flex-wrap: wrap;
    margin-bottom: 20px;
  }

  .toggle-btn {
    background: transparent;
    border: 1px solid rgba(212,175,55,0.25);
    color: #8a7a3a;
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 2px;
    padding: 6px 14px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .toggle-btn.active {
    background: rgba(212,175,55,0.12);
    border-color: #d4af37;
    color: #d4af37;
  }

  .generate-btn {
    width: 100%;
    background: linear-gradient(135deg, #8a6a1a, #d4af37, #8a6a1a);
    border: none;
    color: #000;
    font-family: 'Cinzel', serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 4px;
    padding: 14px;
    cursor: pointer;
    border-radius: 2px;
    text-transform: uppercase;
    transition: opacity 0.2s, transform 0.1s;
  }

  .generate-btn:hover { opacity: 0.9; }
  .generate-btn:active { transform: scale(0.99); }
  .generate-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .results-section { display: none; }
  .results-section.visible { display: block; }

  .results-header {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 4px;
    color: #8a7a3a;
    text-transform: uppercase;
    margin-bottom: 16px;
    text-align: center;
  }

  .name-card {
    background: rgba(212,175,55,0.04);
    border: 1px solid rgba(212,175,55,0.15);
    border-left: 3px solid #d4af37;
    padding: 18px 20px;
    margin-bottom: 12px;
    border-radius: 0 2px 2px 0;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }

  .name-card:hover {
    background: rgba(212,175,55,0.08);
    border-color: rgba(212,175,55,0.4);
    border-left-color: #d4af37;
  }

  .name-card .full-name {
    font-family: 'Cinzel', serif;
    font-size: clamp(18px, 4vw, 24px);
    font-weight: 700;
    color: #d4af37;
    margin-bottom: 6px;
    text-shadow: 0 0 10px rgba(212,175,55,0.3);
  }

  .name-card .meaning {
    font-size: 14px;
    color: #8a7a3a;
    font-style: italic;
    line-height: 1.5;
    padding-right: 60px;
  }

  .name-card .copy-hint {
    position: absolute;
    right: 16px; top: 50%;
    transform: translateY(-50%);
    font-size: 11px;
    letter-spacing: 2px;
    color: rgba(212,175,55,0.3);
    font-family: 'Cinzel', serif;
    text-transform: uppercase;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .name-card:hover .copy-hint { opacity: 1; }

  .copied-toast {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%);
    background: #d4af37;
    color: #000;
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 3px;
    padding: 10px 24px;
    border-radius: 2px;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    z-index: 100;
    text-transform: uppercase;
  }

  .copied-toast.show { opacity: 1; }

  .loading-state { text-align: center; padding: 32px; display: none; }
  .loading-state.visible { display: block; }

  .sabers {
    display: flex; justify-content: center; gap: 6px;
    margin-bottom: 16px;
  }

  .saber {
    width: 4px; height: 40px; border-radius: 2px;
    animation: flicker 1.2s ease-in-out infinite;
  }

  .saber-blue { background: #4fc3f7; box-shadow: 0 0 8px #4fc3f7; }
  .saber-red  { background: #ef5350; box-shadow: 0 0 8px #ef5350; animation-delay: 0.4s; }
  .saber-green{ background: #66bb6a; box-shadow: 0 0 8px #66bb6a; animation-delay: 0.8s; }

  @keyframes flicker {
    0%, 100% { opacity: 1; height: 40px; }
    50% { opacity: 0.7; height: 36px; }
  }

  .loading-text {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 3px;
    color: #8a7a3a;
    text-transform: uppercase;
  }

  .error-box {
    background: rgba(239,83,80,0.08);
    border: 1px solid rgba(239,83,80,0.3);
    border-radius: 4px;
    padding: 16px 20px;
    display: none;
    margin-bottom: 16px;
  }

  .error-box.visible { display: block; }

  .error-box .error-msg {
    color: #ef9a9a;
    font-size: 14px;
    margin-bottom: 12px;
    font-style: italic;
  }

  .retry-btn {
    background: transparent;
    border: 1px solid rgba(239,83,80,0.4);
    color: #ef9a9a;
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 2px;
    padding: 6px 16px;
    cursor: pointer;
    border-radius: 2px;
    text-transform: uppercase;
    transition: all 0.2s;
  }

  .retry-btn:hover {
    background: rgba(239,83,80,0.1);
    border-color: #ef9a9a;
  }

  .footer-text {
    text-align: center;
    font-size: 11px;
    color: rgba(138,122,58,0.5);
    letter-spacing: 2px;
    margin-top: 32px;
    font-family: 'Cinzel', serif;
    text-transform: uppercase;
  }
  .mqwrap{padding:16px 12px 20px;width:100%;box-sizing:border-box;font-family:'Cinzel','Times New Roman',serif;}
.arch-top{display:flex;align-items:flex-end;justify-content:center;gap:3px;height:52px;}
.gold-line{height:2px;background:linear-gradient(90deg,transparent,#d4af37,transparent);margin:0;}
.mqbody{display:flex;align-items:stretch;gap:6px;}
.saber-col{display:flex;flex-direction:row;gap:5px;padding:4px 2px;}
.saber-bar{width:5px;border-radius:3px;min-height:150px;flex:1;}
.sb-blue{background:#4fc3f7;box-shadow:0 0 8px #4fc3f7,0 0 16px rgba(79,195,247,0.3);animation:sp 2.2s ease-in-out infinite;}
.sb-red{background:#ef5350;box-shadow:0 0 8px #ef5350,0 0 16px rgba(239,83,80,0.3);animation:sp 2.2s ease-in-out infinite 0.7s;}
.sb-green{background:#66bb6a;box-shadow:0 0 8px #66bb6a,0 0 16px rgba(102,187,106,0.3);animation:sp 2.2s ease-in-out infinite 1.4s;}
@keyframes sp{0%,100%{opacity:1}50%{opacity:0.55}}
.mqcenter{flex:1;border:1px solid rgba(212,175,55,0.4);border-top:none;display:flex;flex-direction:column;}
.strip-now{background:#0a0a18;border-bottom:1px solid rgba(212,175,55,0.3);text-align:center;padding:6px 8px;}
.strip-label{display:block;font-size:8px;letter-spacing:5px;color:rgba(212,175,55,0.4);margin-bottom:3px;}
.strip-text{font-size:10px;letter-spacing:3px;color:rgba(212,175,55,0.85);font-weight:700;}
.chase-row{display:flex;justify-content:center;align-items:center;gap:5px;padding:6px 10px;background:#040410;border-top:1px solid rgba(212,175,55,0.2);border-bottom:1px solid rgba(212,175,55,0.2);flex-wrap:wrap;}
.bulb{width:8px;height:8px;border-radius:50%;background:#0c0c22;border:1px solid #1a1a30;flex-shrink:0;transition:background 0.12s,box-shadow 0.12s;}
.bulb.lb{background:#4fc3f7;box-shadow:0 0 5px #4fc3f7;border-color:transparent;}
.bulb.lr{background:#ef5350;box-shadow:0 0 5px #ef5350;border-color:transparent;}
.bulb.lg{background:#66bb6a;box-shadow:0 0 5px #66bb6a;border-color:transparent;}
.bulb.lo{background:#d4af37;box-shadow:0 0 5px #d4af37;border-color:transparent;}
.mq-title{background:#040410;text-align:center;padding:20px 12px;color:#d4af37;font-size:clamp(16px,4vw,30px);font-weight:900;letter-spacing:4px;line-height:1.35;text-shadow:0 0 24px rgba(212,175,55,0.4);flex:1;display:flex;align-items:center;justify-content:center;}
.strip-soon{background:#0a0a18;border-top:1px solid rgba(212,175,55,0.15);text-align:center;padding:6px 8px;}
.strip-soon .strip-label{color:rgba(138,122,58,0.4);}
.strip-soon .strip-text{font-size:9px;letter-spacing:3px;color:rgba(138,122,58,0.7);}
</style>
</head>
<body>
<div class="starfield"></div>
<div class="container">
<div class="mqwrap">
  <div class="arch-top">
    <div style="width:3px;height:14px;background:#1a1205;"></div>
    <div style="width:4px;height:20px;background:#3a2a08;"></div>
    <div style="width:5px;height:28px;background:#5a4010;"></div>
    <div style="width:6px;height:36px;background:#8a6a1a;"></div>
    <div style="width:8px;height:44px;background:#b08820;"></div>
    <div style="width:0;height:0;border-left:16px solid transparent;border-right:16px solid transparent;border-bottom:52px solid #d4af37;"></div>
    <div style="width:8px;height:44px;background:#b08820;"></div>
    <div style="width:6px;height:36px;background:#8a6a1a;"></div>
    <div style="width:5px;height:28px;background:#5a4010;"></div>
    <div style="width:4px;height:20px;background:#3a2a08;"></div>
    <div style="width:3px;height:14px;background:#1a1205;"></div>
  </div>
  <div class="gold-line"></div>
  <div class="mqbody">
    <div class="saber-col">
      <div class="saber-bar sb-blue"></div>
      <div class="saber-bar sb-red"></div>
      <div class="saber-bar sb-green"></div>
    </div>
    <div class="mqcenter">
      <div class="strip-now">
        <span class="strip-label">NOW SHOWING</span>
        <span class="strip-text">JEDI ARCHIVES — NOMENCLATURE DIVISION</span>
      </div>
      <div class="chase-row" id="mqChaseTop"></div>
      <div class="mq-title">STAR WARS<br>NAME GENERATOR</div>
      <div class="chase-row" id="mqChaseBot"></div>
      <div class="strip-soon">
        <span class="strip-label">COMING ATTRACTIONS</span>
        <span class="strip-text">CHOOSE YOUR INITIALS — THE FORCE WILL HANDLE THE REST</span>
      </div>
    </div>
    <div class="saber-col">
      <div class="saber-bar sb-green"></div>
      <div class="saber-bar sb-red"></div>
      <div class="saber-bar sb-blue"></div>
    </div>
  </div>
  <div class="gold-line"></div>
</div>
<script>
(function(){
  const N=22,LIT=4,COLS=['lb','lr','lg','lo'];
  function fill(id){const c=document.getElementById(id);if(!c)return;for(let i=0;i<N;i++){const b=document.createElement('div');b.className='bulb';c.appendChild(b);}}
  fill('mqChaseTop');fill('mqChaseBot');
  let off=0,ci=0;
  function tick(){
    ['mqChaseTop','mqChaseBot'].forEach(function(id,ri){
      const row=document.getElementById(id);if(!row)return;
      const bulbs=row.querySelectorAll('.bulb');
      bulbs.forEach(function(b,i){
        b.className='bulb';
        const eff=ri===1?(N-off)%N:off;
        if((i+eff)%LIT===0){b.classList.add(COLS[(ci+Math.floor(i/LIT))%COLS.length]);}
      });
    });
    off=(off+1)%LIT;if(off===0)ci=(ci+1)%COLS.length;
  }
  setInterval(tick,160);tick();
})();
</script>

  <div class="divider"><span class="divider-icon">✦</span></div>

  <div class="form-section">
    <div class="form-row">
      <div class="field-group">
        <label>First Name Initial</label>
        <input class="initial-input" id="firstInitial" maxlength="1" placeholder="H" type="text" />
      </div>
      <div class="field-group">
        <label>Last Name Initial</label>
        <input class="initial-input" id="lastInitial" maxlength="1" placeholder="W" type="text" />
      </div>
    </div>

    <div style="margin-bottom: 16px;">
      <label style="display:block; margin-bottom: 10px;">Name Style</label>
      <div class="options-row">
        <button class="toggle-btn active" data-style="jedi" onclick="selectStyle(this)">Jedi / Republic</button>
        <button class="toggle-btn" data-style="sith" onclick="selectStyle(this)">Sith / Imperial</button>
        <button class="toggle-btn" data-style="outer" onclick="selectStyle(this)">Outer Rim</button>
      </div>
    </div>

    <button class="generate-btn" id="generateBtn" onclick="generateNames()">
      ✦ Consult the Archives ✦
    </button>
  </div>

  <div class="error-box" id="errorBox">
    <div class="error-msg" id="errorMsg"></div>
    <button class="retry-btn" onclick="generateNames()">↺ Try Again</button>
  </div>

  <div class="loading-state" id="loadingState">
    <div class="sabers">
      <div class="saber saber-blue"></div>
      <div class="saber saber-red"></div>
      <div class="saber saber-green"></div>
    </div>
    <div class="loading-text">Consulting the Jedi Archives...</div>
  </div>

  <div class="results-section" id="resultsSection">
    <div class="results-header">✦ Names Recovered from the Archives ✦</div>
    <div id="namesList"></div>
  </div>

  <div class="footer-text">May the Fourth Be With You</div>
</div>

<div class="copied-toast" id="copiedToast">Copied to Clipboard</div>

<script>
let selectedStyle = 'jedi';
const TIMEOUT_MS = 20000;

function selectStyle(btn) {
  document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedStyle = btn.dataset.style;
}

document.querySelectorAll('.initial-input').forEach(input => {
  input.addEventListener('input', function() {
    this.value = this.value.replace(/[^a-zA-Z]/g, '').toUpperCase().slice(0, 1);
  });
});

function setUIState(state) {
  const btn      = document.getElementById('generateBtn');
  const loading  = document.getElementById('loadingState');
  const results  = document.getElementById('resultsSection');
  const errorBox = document.getElementById('errorBox');

  btn.disabled = (state === 'loading');
  loading .classList.toggle('visible', state === 'loading');
  results .classList.toggle('visible', state === 'results');
  errorBox.classList.toggle('visible', state === 'error');
}

async function generateNames() {
  const first = document.getElementById('firstInitial').value.trim().toUpperCase();
  const last  = document.getElementById('lastInitial').value.trim().toUpperCase();

  if (!first || !last) {
    document.getElementById('errorMsg').textContent = 'Please enter both initials to consult the Archives.';
    setUIState('error');
    return;
  }

  setUIState('loading');

  const styleDescriptions = {
    jedi:  'Jedi Order / Galactic Republic — melodic, noble, soft consonants, apostrophes or hyphens welcome. Examples: Qui-Gon, Obi-Wan, Mace, Aayla, Shaak Ti.',
    sith:  'Sith / Imperial — hard consonants, dark phonemes, short and threatening. Examples: Darth Maul, Sidious, Tyranus, Vader.',
    outer: 'Outer Rim / Non-Jedi — exotic, multicultural, gritty. Examples: Han Solo, Greedo, Bossk, Aurra Sing.'
  };

  const prompt = `You are a Star Wars naming expert. Generate exactly 5 Star Wars character names where the first name starts with "${first}" and the last name starts with "${last}".

Style: ${styleDescriptions[selectedStyle]}

Rules:
- Names must feel authentically Star Wars, never Earth names
- First name MUST start with ${first}, last name MUST start with ${last}
- Use authentic SW phonemes — apostrophes, hyphens, unusual combos encouraged
- Include a one-sentence flavor description per name (species hint, personality fragment, or backstory note — evocative)

Respond ONLY with a JSON array, no preamble, no markdown fences:
[{"name":"Full Name","flavor":"Flavor text."},...]`;

  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), TIMEOUT_MS);

  try {
    const response = await fetch("/.netlify/functions/generate", {
      method: "POST",
      signal: controller.signal,
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });

    clearTimeout(timer);

    if (!response.ok) {
      throw new Error(`API responded with status ${response.status}`);
    }

    const data = await response.json();

    if (data.error) {
      throw new Error(data.error.message || 'API error');
    }

    const text  = (data.content || []).map(i => i.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const names = JSON.parse(clean);

    const namesList = document.getElementById('namesList');
    namesList.innerHTML = '';

    names.forEach(entry => {
      const card = document.createElement('div');
      card.className = 'name-card';
      card.innerHTML = `
        <div class="full-name">${entry.name}</div>
        <div class="meaning">${entry.flavor}</div>
        <div class="copy-hint">Copy</div>`;
      card.onclick = () => copyName(entry.name);
      namesList.appendChild(card);
    });

    setUIState('results');

  } catch (err) {
    clearTimeout(timer);
    const msg = err.name === 'AbortError'
      ? 'The Archives timed out. The hyperspace lanes may be congested — try again.'
      : 'The Archives are unreachable. Check your connection and try again.';
    document.getElementById('errorMsg').textContent = msg;
    setUIState('error');
  }
}

function copyName(name) {
  navigator.clipboard.writeText(name).catch(() => {});
  const toast = document.getElementById('copiedToast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}
</script>
</body>
</html>
